name: Build Image AWS OIDC

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        default: ubuntu
      context:
        required: false
        default: ./
      service:
        required: true
        type: string
      oidc_role:
        required: true
        type: string
      aws_region:
        required: true
        type: string
    outputs:
      image:
        description: Built image tag
        value: ${{ jobs.build.outputs.image }}

permissions:
  id-token: write
  contents: read

run-name: Building image  branch: ${{ github.ref_name }}  service: ${{ inputs.service }}

jobs:
  build:
    runs-on: ${{ steps.tag.inputs.runs-on }}
    outputs:
      image: ${{ steps.tag.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.oidc_role }}
          aws-region: ${{ inputs.aws_region }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Generate image tag
        id: tag
        run: |
              echo "image=${{ steps.login-ecr.outputs.registry }}/${{ inputs.service }}:${{ steps.tag.outputs.image_tag }}" >> $GITHUB_OUTPUT
              echo "BUILDING IMAGE: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.service }}:${{ steps.tag.outputs.image_tag }}"

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ inputs.service }}:${{ steps.tag.outputs.image_tag }}
          push: true

      - name: Finishing build
        id: build
        run: |
             echo "======= CONGRATULATIONS ==========\n"
             echo "======= IMAGE BUILDED  =========="

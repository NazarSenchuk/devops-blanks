name: Build Image DH

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
        type: string
      DOCKERHUB_TOKEN:
        required: true
        type: string
    inputs:
      runs-on:
        required: false
        default: ubuntu-latest
        type: string
      context:
        required: false
        default: ./
        type: string
      service:
        required: true
        type: string
      registry:
        required: false
        default: docker.io
        type: string

    outputs:
      image:
        description: Built image tag
        value: ${{ jobs.build.outputs.image }}

permissions:
  id-token: write
  contents: read

run-name: Building image  branch: ${{ github.ref_name }}  service: ${{ inputs.service }}

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    outputs:
      image: ${{ steps.tag.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          IMAGE_TAG="${{ github.sha }}"
          FULL_IMAGE="${{ inputs.registry }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service }}:$IMAGE_TAG"
          echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "BUILDING IMAGE: $FULL_IMAGE"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ${{ steps.tag.outputs.image }}


      - name: Finishing build
        id: build
        run: |
             echo "======= CONGRATULATIONS ==========\n"
             echo "======= IMAGE BUILDED  =========="
